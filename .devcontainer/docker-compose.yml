services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/dockerfile
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    network_mode: "service:db"

  db:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - ../.env
    ports:
      - "5432:5432"

volumes:
  postgres-data:
